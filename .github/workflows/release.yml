name: Release Extension

on:
  push:
    tags:
      - 'v*'  # Se déclenche sur les tags commençant par 'v' (ex: v1.0.0)

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build extension
      run: npm run package
      
    - name: Install vsce
      run: npm install -g @vscode/vsce
      
    - name: Package extension
      run: vsce package
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Get extension filename
      id: get_filename
      run: |
        FILENAME=$(find . -name "*.vsix" -type f | head -n 1)
        echo "FILENAME=${FILENAME}" >> $GITHUB_OUTPUT
        echo "BASENAME=$(basename ${FILENAME})" >> $GITHUB_OUTPUT
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          🚀 **PHP Test Collections Explorer v${{ steps.get_version.outputs.VERSION }}**
          
          ## Installation
          Téléchargez le fichier `.vsix` ci-dessous et installez-le dans VS Code :
          ```
          code --install-extension ${{ steps.get_filename.outputs.BASENAME }}
          ```
          
          Ou via l'interface VS Code : `Extensions > ... > Install from VSIX`
          
          ## Changements
          Voir le [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) pour les détails.
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.get_filename.outputs.FILENAME }}
        asset_name: ${{ steps.get_filename.outputs.BASENAME }}
        asset_content_type: application/zip